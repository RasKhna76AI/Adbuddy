kind = "web"
previewPath = "/"
title = "Tour & Travel"
version = "1.0.0"
id = "artifacts/tour-travel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22417

[services.development]
run = "pnpm --filter @workspace/tour-travel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tour-travel", "run", "build" ]
publicDir = "artifacts/tour-travel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22417"
BASE_PATH = "/"
